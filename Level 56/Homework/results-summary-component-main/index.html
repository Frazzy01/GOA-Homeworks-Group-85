<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main">
    <div class="cards">
      <div class="left">
        <p class="title">Your Result</p>
        
        <div class="circle">
          <h1>76</h1>
          <p>of 100</p>
        </div>

        <h2>Great</h2>
        <p class="text">You scored higher than 65% of the people who have taken these tests.</p>

      </div>

      <div class="right">

        <h3>Summary</h3>

        <div class="item red">
          <div><img src="icon-reaction.svg" alt="Reaction">Reaction</div>
          <div><b>80</b> / 100</div>
        </div>

        <div class="item yellow">
          <div><img src="icon-memory.svg" alt="Memory"> Memory</div>
          <div><b>92</b> / 100</div>
        </div>

        <div class="item green">
          <div><img src="icon-verbal.svg" alt="Verbal"> Verbal</div>
          <div><b>61</b> / 100</div>
        </div>

        <div class="item blue">
          <div><img src="icon-visual.svg" alt="Visual"> Visual</div>
          <div><b>73</b> / 100</div>
        </div>

        <button>Continue</button>

      </div>

    </div>
  </div>

</body>
</html>
