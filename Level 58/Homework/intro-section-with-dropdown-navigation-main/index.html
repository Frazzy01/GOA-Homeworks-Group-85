<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="body">
    <header>
        <div id="headerdiv">
          <img class="icon" src="logo.svg" alt="logo">
          <nav>
            <ol>
              <li>Features <img src="icon-arrow-down.svg" alt="down"></li>
              <li>Company <img src="icon-arrow-down.svg" alt="down"></li>
              <li>Careers</li>
              <li>About</li>
            </ol>
          </nav>
        </div>
        <div id="buttondiv">
          <button class="LL">Login</button>
          <button class="RR">Register</button>
        </div>

    </header>

    <div class="maindiv">
      <div class="textdiv">
        <h1>Make <br>
          remote work</h1>
        <div class="Ptxt">
        <p class="qwerty">Get your team in sync, no matter your location. Streamline processes, 
        create team rituals, and watch productivity soar.</p>
        </div>
        
        <button class="learn">Learn more</button>

        <div class="imgdiv">
          <img src="client-databiz.svg" alt="databiz">
          <img src="client-audiophile.svg" alt="audiophile">
          <img src="client-meet.svg" alt="meet">
          <img src="client-maker.svg" alt="maker">
        </div>
      </div>

      <img id="hero" src="image-hero-desktop.png" alt="hero">

    </div>
  </div>
</body>
</html>
